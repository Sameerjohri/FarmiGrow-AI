<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Signup</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .overlay {
        background-color: rgba(0, 0, 0, 0.55); /* same as firstAppearance */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      body {
        background-image: url("{{ url_for('static', filename='images/Background.png') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
      }

      /* signup card */

      .signup-card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        padding: 25px;
      }

      .row.justify-content-center {
        height: 60%;
      }

      .coll{
        background-color:rgb(244, 209, 6);
      }
      .coll:hover{
        background-color:rgb(214, 156, 10);
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-5">
            <div class="signup-card">
              <h3 class="text-center mb-4">Signup</h3>

              <form
                action="{{ url_for('signup') }}"
                method="POST"
                onsubmit="return validateSignup();"
              >
                <div class="mb-3">
                  <label class="form-label">Username</label>
                  <input
                    type="text"
                    name="username"
                    id="username"
                    class="form-control"
                    pattern="^[a-zA-Z0-9_]{3,15}$"
                    title="Username must be 3-15 characters and contain only letters, numbers, or underscores"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-control"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Password</label>
                  <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    required
                    minlength="6"
                  />
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input
                    type="password"
                    name="confirmPassword"
                    id="confirmPassword"
                    class="form-control"
                    required
                  />
                </div>

                <button type="submit" class="btn w-100 coll">
                  Create Account
                </button>

                <p class="text-center mt-3">
                  Already have an account?
                  <a href="{{ url_for('login') }}"" style="color: rgb(206, 216, 65);">Login</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function validateSignup() {
        let password = document.getElementById("password").value;
        let confirmPassword = document.getElementById("confirmPassword").value;

        if (password !== confirmPassword) {
          alert("Passwords do not match");
          return false;
        }

        return true;
      }
    </script>
  </body>
</html>
